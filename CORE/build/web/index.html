<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CORE App</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .form-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .switch-link { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .switch-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Login</h2>
        <form action="MainServlet" method="POST">
            <input type="hidden" name="action" value="login">
            <input type="text" name="name" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login Now</button>
        </form>
        <div class="switch-link">
            New user? <a href="register.jsp">Register here</a>
        </div>
    </div>

</body>
</html>
